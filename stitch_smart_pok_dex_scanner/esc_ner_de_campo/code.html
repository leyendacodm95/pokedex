            animation: scan-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;

</div>
</div>

<div class="glass-panel flex items-center px-4 py-3 rounded-full border border-white/10 group transition-all duration-300 focus-within:border-secondary-fixed focus-within:shadow-[0_0_15px_rgba(0,251,251,0.2)]">

<div class="absolute top-0 left-4 right-4 h-[1px] bg-secondary-fixed opacity-50 shadow-[0_0_10px_#00fbfb]" id="scan-line"></div>
<!-- Technical Data Dots -->
<div class="absolute -top-8 -left-4 text-[10px] font-data-num text-secondary-fixed/70 uppercase">Tracking Active</div>

</div>

<section class="fixed bottom-0 left-0 w-full z-40">

                Apunta al Pokémon para identificarlo
            </p>

<button class="relative group active:scale-95 transition-transform duration-200 pointer-events-auto">

<!-- Scanning Line Animation Script -->
<script>
        const scanLine = document.getElementById('scan-line');
        let position = 0;
        let direction = 1;
        const speed = 1.5;
        const height = 384; // Matches the w-96 (24rem = 384px) at desktop size

        function animateScan() {
            position += direction * speed;
            if (position >= height || position <= 0) {
                direction *= -1;
            }
            scanLine.style.top = `${position}px`;
            requestAnimationFrame(animateScan);
        }

        animateScan();

        // Simulate micro-interactions
        document.querySelectorAll('button, .cursor-pointer').forEach(el => {
            el.addEventListener('mousedown', () => {
                const audio = new Audio('https://www.soundjay.com/buttons/sounds/button-37a.mp3');
                audio.volume = 0.1;
                // audio.play(); // Muted by default to avoid annoyance
            });
        });
    </script>
